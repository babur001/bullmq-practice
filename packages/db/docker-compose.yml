name: learn-broker

services:
  postgres:
    image: postgres
    container_name: learn-broker-postgres
    environment:
      POSTGRES_DB: learn-broker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - learn-broker_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: learn-broker-redis
    ports:
      - "6379:6379"
    volumes:
      - learn-broker_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  learn-broker_postgres_data:
  learn-broker_redis_data:
